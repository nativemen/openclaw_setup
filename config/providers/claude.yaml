# ==============================================================================
# Anthropic Claude Provider Configuration
# ==============================================================================
# OpenClaw Custom Provider Configuration
# 文档: https://docs.openclaw.ai/gateway/configuration-reference#custom-providers
# ==============================================================================

# 模型提供商配置 (OpenClaw 自定义提供商格式)
models:
  mode: "merge"
  providers:
    anthropic:
      # API 端点 (Anthropic 兼容格式)
      baseUrl: "https://api.anthropic.com/v1"
      # API 密钥 (从环境变量读取)
      apiKey: "${ANTHROPIC_API_KEY}"
      # API 类型: openai-completions | openai-responses | anthropic-messages
      api: "anthropic-messages"
      # 可用模型列表
      models:
        - id: "claude-opus-4-20250514"
          name: "Claude Opus 4.5"
          contextWindow: 200000
          maxTokens: 8192
          reasoning: true
          input: ["text"]
          cost:
            input: 15.0
            output: 75.0
            cacheRead: 1.5
            cacheWrite: 7.5
        - id: "claude-sonnet-4-20250514"
          name: "Claude Sonnet 4.5"
          contextWindow: 200000
          maxTokens: 8192
          reasoning: false
          input: ["text"]
          cost:
            input: 3.0
            output: 15.0
            cacheRead: 0.3
            cacheWrite: 1.5

# 代理默认配置
agents:
  defaults:
    # 主模型
    model:
      primary: "anthropic/claude-sonnet-4-20250514"
      fallbacks:
        - "anthropic/claude-opus-4-20250514"
    # 模型别名和元数据
    models:
      "anthropic/claude-opus-4-20250514":
        alias: "Claude Opus"
      "anthropic/claude-sonnet-4-20250514":
        alias: "Claude Sonnet"
