# ==============================================================================
# Google Gemini Provider Configuration
# ==============================================================================
# OpenClaw Custom Provider Configuration
# 文档: https://docs.openclaw.ai/gateway/configuration-reference#custom-providers
# ==============================================================================

# 模型提供商配置 (OpenClaw 自定义提供商格式)
models:
  mode: "merge"
  providers:
    google:
      # API 端点 (Google Gemini OpenAI 兼容格式)
      baseUrl: "https://generativelanguage.googleapis.com/v1beta/openai"
      # API 密钥 (从环境变量读取)
      apiKey: "${GEMINI_API_KEY}"
      # API 类型: openai-completions | openai-responses | anthropic-messages
      api: "openai-completions"
      # 可用模型列表
      models:
        - id: "gemini-flash-latest"
          name: "Gemini Flash Latest"
          contextWindow: 1000000
          maxTokens: 8192
          reasoning: false
          input: ["text", "image"]
          cost:
            input: 0.0
            output: 0.0
            cacheRead: 0.0
            cacheWrite: 0.0
        - id: "gemini-pro-latest"
          name: "Gemini Pro Latest"
          contextWindow: 2000000
          maxTokens: 8192
          reasoning: false
          input: ["text", "image"]
          cost:
            input: 0.0
            output: 0.0
            cacheRead: 0.0
            cacheWrite: 0.0

# 代理默认配置
agents:
  defaults:
    # 主模型
    model:
      primary: "google/gemini-flash-latest"
      fallbacks:
        - "google/gemini-pro-latest"
    # 模型别名和元数据
    models:
      "google/gemini-flash-latest":
        alias: "Gemini Flash"
      "google/gemini-pro-latest":
        alias: "Gemini Pro"
